<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Garu | Game Developer• Animator</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ========================= */
/* BASE */
/* ========================= */

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: #eaeaea;
    background: radial-gradient(circle at top, #1c1612, #0d0b09, #050403);
}

/* ========================= */
/* NAV */
/* ========================= */

nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;

    padding: 18px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #222;
    z-index: 1000;
}

nav a {
    color: #bbb;
    text-decoration: none;
}

nav a:hover {
    color: white;
}

/* ========================= */
/* HERO (MAIOR) */
/* ========================= */

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 140px;
    margin: 0;
    font-family: 'Cinzel', serif;
    letter-spacing: 10px;
}

.hero p {
    color: #aaa;
    font-size: 20px;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section {
    padding: 120px 20px;
    max-width: 1100px;
    margin: auto;
}

/* ========================= */
/* CARDS */
/* ========================= */

.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid #2a2a2a;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* ========================= */
/* VIDEO */
/* ========================= */

iframe {
    width: 100%;
    height: 320px;
    border-radius: 10px;
    border: none;
}

/* ========================= */
/* MUSIC BUTTON */
/* ========================= */

.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;

    padding: 10px 15px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #444;
    color: #c9b37a;
    cursor: pointer;

    border-radius: 8px;
    z-index: 2000;

    transition: 0.3s;
}

.music-btn:hover {
    transform: scale(1.05);
    border-color: #c9b37a;
}

</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="medieval-ambient.mp3" type="audio/mpeg">
</audio>

<!-- 🎮 PLAY MUSIC BUTTON -->
<button class="music-btn" onclick="document.getElementById('bgMusic').play()">
    ▶ Play Music
</button>

<!-- NAV -->
<nav>
    <a href="#home">Start</a>
    <a href="#showreel">Showreel</a>
    <a href="#projects">Projects</a>
</nav>

<!-- HERO -->
<section id="home" class="hero">
    <h1>GARU</h1>
    <p>Game Developer • Animator</p>
</section>

<!-- SHOWREEL -->
<section id="showreel">
    <h2>Showreel</h2>
    <div class="card">
        <iframe src="https://www.youtube.com/embed/SEU_SHOWREEL_ID" allowfullscreen></iframe>
    </div>
</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Projects</h2>

<div class="card">
    <h3>2D Platformer</h3>
    <iframe src="https://www.youtube.com/embed/BGmOsk9fCFk"></iframe>
</div>

<div class="card">
    <h3>Jester</h3>
    <iframe src="https://www.youtube.com/embed/fC5_dm4_tV8"></iframe>
</div>

</section>

</body>
</html>
